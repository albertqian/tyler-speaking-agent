name: Weekly Speaking Gig Search

on:
  schedule:
    # Every Sunday at 5:00 PM Pacific time.
    - cron: "0 17 * * 0"
      timezone: "America/Los_Angeles"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run search and print digest without sending email"
        required: false
        default: "false"

concurrency:
  group: weekly-speaking-gig-search
  cancel-in-progress: true

jobs:
  search-and-email:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run speaking gig search
        env:
          PYTHONPATH: src
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          SEARCH_PROVIDER: ${{ secrets.SEARCH_PROVIDER }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          # Google/Gmail App Password stored as a GitHub Actions secret.
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          FROM_NAME: ${{ secrets.FROM_NAME }}
          MIN_SCORE: ${{ secrets.MIN_SCORE }}
          MAX_RESULTS_PER_QUERY: ${{ secrets.MAX_RESULTS_PER_QUERY }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python -m speaking_gig_agent.main
